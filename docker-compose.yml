services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    environment:
      CLUSTER_ID: MDEyMzQ1Njc4OUFCQ0RFRg
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "9092:9092"
    volumes:
      - ./runtime/kafka:/var/lib/kafka/data
    networks:
      - observability

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-init
    depends_on:
      - kafka
    entrypoint:
      - /bin/sh
      - -c
      - |
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic observability.logs --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic observability.traces --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic observability.metrics --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic metric.anomaly --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic log.error_pattern --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic trace.slow_span --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic trace.error --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic incident.candidate --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic incident.evidence --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic rca.result --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic rca.agent_report --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic rca.dead_letter --partitions 3 --replication-factor 1
    networks:
      - observability

  postgres:
    image: pgvector/pgvector:pg16
    container_name: rca-postgres
    environment:
      POSTGRES_DB: rca
      POSTGRES_USER: rca
      POSTGRES_PASSWORD: rca
    ports:
      - "5432:5432"
    volumes:
      - ./runtime/postgres:/var/lib/postgresql/data
      - ./infra/postgres.sql:/docker-entrypoint-initdb.d/001-postgres.sql:ro
    networks:
      - observability

  neo4j:
    image: neo4j:5.22-community
    container_name: rca-neo4j
    environment:
      NEO4J_AUTH: neo4j/rca-password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./runtime/neo4j:/data
      - ./infra/neo4j.cypher:/var/lib/neo4j/import/neo4j.cypher:ro
    networks:
      - observability

  ai-observability-rca-engine:
    build:
      context: .
    container_name: ai-observability-rca-engine
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_GROUP_ID: ai-observability-rca-engine
      RCA_INPUT_TOPICS: observability.logs,observability.traces,observability.metrics
      RCA_MODE: all
      RCA_RUNTIME_DIR: /app/runtime
      RCA_API_HOST: 0.0.0.0
      RCA_API_PORT: 8000
      RCA_SLOW_SPAN_THRESHOLD_MS: 1000
      RCA_METRIC_MIN_SAMPLES: 5
      RCA_METRIC_STDDEV_MULTIPLIER: 3
      RCA_INCIDENT_WINDOW_SECONDS: 300
      RCA_TOPIC_RESULT: rca.result
      RCA_TOPIC_AGENT_REPORT: rca.agent_report
      POSTGRES_DSN: postgresql://rca:rca@postgres:5432/rca
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: rca-password
      RAG_EMBEDDING_DIMENSIONS: 1536
      RAG_CACHE_TTL_SECONDS: 300
      LLM_PROVIDER: disabled
      LLM_API_URL: ""
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ""
      LLM_REASONING_EFFORT: medium
      LLM_TEMPERATURE: 0.1
      LLM_MAX_OUTPUT_TOKENS: 1200
      LLM_TIMEOUT_SECONDS: 20
      LLM_STREAMING_ENABLED: "false"
      LLM_RERANK_ENABLED: "false"
      RAG_LLM_ENABLED: "false"
      RAG_LLM_API_URL: ""
      RAG_LLM_API_KEY: ""
      RAG_LLM_MODEL: ""
      RAG_LLM_TIMEOUT_SECONDS: 20
    ports:
      - "18000:8000"
    volumes:
      - ./runtime:/app/runtime
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      neo4j:
        condition: service_started
    networks:
      - observability

  rca-ui:
    build:
      context: .
    container_name: rca-ui
    command:
      - streamlit
      - run
      - src/rca_engine/console/app.py
      - --server.address=0.0.0.0
      - --server.port=8501
      - --browser.gatherUsageStats=false
    environment:
      RCA_API_BASE_URL: http://ai-observability-rca-engine:8000
    ports:
      - "8501:8501"
    depends_on:
      - ai-observability-rca-engine
    networks:
      - observability

networks:
  observability:
    driver: bridge
